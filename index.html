<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow // Modern To-Do</title>
    <!-- Tailwind CSS for sleek styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center p-4 sm:p-8">

    <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-8 mt-4">
        
        <!-- Left Column: Add Task Form & Stats -->
        <div class="md:col-span-1 space-y-6">
            <div class="glass p-6 rounded-2xl border border-slate-200/80 shadow-sm">
                <div class="flex items-center gap-2 mb-6">
                    <i data-lucide="check-square" class="w-6 h-6 text-indigo-600"></i>
                    <h1 class="text-xl font-bold tracking-tight text-slate-900">FocusFlow</h1>
                </div>
                
                <form id="task-form" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Task Title</label>
                        <input type="text" id="task-title" required placeholder="What needs to be done?" 
                            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white/50 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-sm">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Notes / Description</label>
                        <textarea id="task-notes" placeholder="Add optional details..." rows="3"
                            class="w-full px-4 py-2.5 rounded-xl border border-slate-200 bg-white/50 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-sm resize-none"></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Priority</label>
                            <select id="task-priority" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Due Date</label>
                            <input type="date" id="task-date" class="w-full px-3 py-2 rounded-xl border border-slate-200 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
                        </div>
                    </div>

                    <button type="submit" class="w-full mt-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-xl transition-all shadow-md shadow-indigo-600/10 flex items-center justify-center gap-2 text-sm">
                        <i data-lucide="plus" class="w-4 h-4"></i> Add Task
                    </button>
                </form>
            </div>

            <!-- Stats Module -->
            <div class="glass p-6 rounded-2xl border border-slate-200/80 shadow-sm space-y-4">
                <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-500">Progress Tracker</h3>
                <div class="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden">
                    <div id="progress-bar" class="bg-indigo-600 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <div class="flex justify-between text-xs font-medium text-slate-600">
                    <span id="stats-complete">0 Completed</span>
                    <span id="stats-total">0 Total Tasks</span>
                </div>
            </div>
        </div>

        <!-- Right Column: Task List -->
        <div class="md:col-span-2 space-y-4">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-lg font-semibold text-slate-900">Your Tasks</h2>
                <div class="flex gap-2">
                    <button onclick="filterTasks('all')" id="filter-all" class="px-3 py-1.5 rounded-lg text-xs font-medium bg-indigo-50 text-indigo-700 border border-indigo-100">All</button>
                    <button onclick="filterTasks('active')" id="filter-active" class="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-600 hover:bg-slate-100">Active</button>
                    <button onclick="filterTasks('completed')" id="filter-completed" class="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-600 hover:bg-slate-100">Completed</button>
                </div>
            </div>

            <div id="task-container" class="space-y-3">
                <!-- Tasks dynamically injected here -->
            </div>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let currentFilter = 'all';

        const taskForm = document.getElementById('task-form');
        const taskContainer = document.getElementById('task-container');

        taskForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const newTask = {
                id: Date.now(),
                title: document.getElementById('task-title').value,
                notes: document.getElementById('task-notes').value,
                priority: document.getElementById('task-priority').value,
                date: document.getElementById('task-date').value,
                completed: false
            };
            tasks.push(newTask);
            saveAndRender();
            taskForm.reset();
        });

        function saveAndRender() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
            renderTasks();
            updateStats();
        }

        function toggleTask(id) {
            tasks = tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
            saveAndRender();
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRender();
        }

        function filterTasks(type) {
            currentFilter = type;
            ['all', 'active', 'completed'].forEach(filter => {
                const btn = document.getElementById(`filter-${filter}`);
                if (filter === type) {
                    btn.className = "px-3 py-1.5 rounded-lg text-xs font-medium bg-indigo-50 text-indigo-700 border border-indigo-100";
                } else {
                    btn.className = "px-3 py-1.5 rounded-lg text-xs font-medium text-slate-600 hover:bg-slate-100";
                }
            });
            renderTasks();
        }

        function updateStats() {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);
            
            document.getElementById('progress-bar').style.width = `${percentage}%`;
            document.getElementById('stats-complete').innerText = `${completed} Completed`;
            document.getElementById('stats-total').innerText = `${total} Total Tasks`;
        }

        function renderTasks() {
            taskContainer.innerHTML = '';
            let filteredTasks = tasks;
            if (currentFilter === 'active') filteredTasks = tasks.filter(t => !t.completed);
            if (currentFilter === 'completed') filteredTasks = tasks.filter(t => t.completed);

            if (filteredTasks.length === 0) {
                taskContainer.innerHTML = `
                    <div class="text-center py-12 bg-white rounded-2xl border border-dashed border-slate-200">
                        <i data-lucide="inbox" class="w-8 h-8 mx-auto text-slate-300 mb-2"></i>
                        <p class="text-sm text-slate-400 font-medium">No tasks found here.</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            filteredTasks.forEach(task => {
                const priorityClasses = {
                    low: 'bg-emerald-50 text-emerald-700 border-emerald-100',
                    medium: 'bg-amber-50 text-amber-700 border-amber-100',
                    high: 'bg-rose-50 text-rose-700 border-rose-100'
                };

                const div = document.createElement('div');
                div.className = `glass p-5 rounded-2xl border border-slate-200 shadow-sm flex items-start gap-4 transition-all duration-300 ${task.completed ? 'opacity-60 bg-slate-50/50' : ''}`;
                
                div.innerHTML = `
                    <button onclick="toggleTask(${task.id})" class="mt-1 w-5 h-5 rounded-md border flex items-center justify-center transition-all ${task.completed ? 'bg-indigo-600 border-indigo-600 text-white' : 'border-slate-300 hover:border-indigo-500 bg-white'}">
                        ${task.completed ? '<i data-lucide="check" class="w-3.5 h-3.5 stroke-[3]"></i>' : ''}
                    </button>
                    <div class="flex-1 space-y-1">
                        <div class="flex flex-wrap items-center gap-2">
                            <h3 class="font-semibold text-sm ${task.completed ? 'line-through text-slate-400' : 'text-slate-800'}">${task.title}</h3>
                            <span class="text-[10px] uppercase tracking-wider font-bold px-2 py-0.5 rounded-full border ${priorityClasses[task.priority]}">
                                ${task.priority}
                            </span>
                            ${task.date ? `
                            <span class="text-xs text-slate-400 flex items-center gap-1 ml-auto">
                                <i data-lucide="calendar" class="w-3 h-3"></i> ${task.date}
                            </span>` : ''}
                        </div>
                        ${task.notes ? `<p class="text-xs text-slate-500 leading-relaxed font-light">${task.notes.replace(/\n/g, '<br>')}</p>` : ''}
                    </div>
                    <button onclick="deleteTask(${task.id})" class="text-slate-400 hover:text-rose-600 transition-colors p-1 rounded-lg hover:bg-slate-100/80">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                `;
                taskContainer.appendChild(div);
            });
            lucide.createIcons();
        }

        // Initial setup
        renderTasks();
        updateStats();
    </script>
</body>
</html>
